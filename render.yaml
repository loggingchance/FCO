services:
  - type: web
    name: fco-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: FIA_API_BASE_URL
        value: https://apps.fs.usda.gov/fiadb-api
      - key: FIA_DEFAULT_EVALUATION_YEAR
        value: 2023
      - key: FIA_TIMEOUT_SECONDS
        value: 30
      - key: CORS_ORIGINS
        sync: false

